<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>
Bybit Pro Terminal X
</title>


<style>

body{

background:#f4f7fb;
color:#111827;
font-family:Arial,sans-serif;
padding:30px;

}


h1{

color:#1e40af;

}


.status{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-bottom:20px;

}


.card{

background:white;
border-radius:18px;
padding:25px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.12);

}


.long{

border-left:8px solid #16a34a;

}


.short{

border-left:8px solid #dc2626;

}


.badge{

padding:8px 15px;
border-radius:20px;
color:white;
font-weight:bold;

}


.green{

background:#16a34a;

}


.red{

background:#dc2626;

}


.score{

font-size:30px;
font-weight:bold;
color:#2563eb;

}


.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:20px;

}


.box{

background:#eef2ff;
padding:15px;
border-radius:12px;

}


.reason{

margin-top:10px;
padding:10px;
background:#f8fafc;
border-radius:10px;

}


.empty{

text-align:center;
font-size:20px;

}


</style>

</head>


<body>


<h1>
🚀 Bybit Pro Terminal X
</h1>


<h2>
📡 Живой сканер рынка
</h2>



<div id="status" class="status">

Подключение к серверу...

</div>



<div id="terminal">

</div>



<script>


async function загрузить(){


try{


let ответ = await fetch("/signals");


let данные = await ответ.json();



document.getElementById("status").innerHTML = `

🟢 Состояние:
<b>${данные.status}</b>

<br>

📊 Найдено сигналов:
<b>${данные.count}</b>

<br>

⏱ Обновление:
каждые 15 секунд

`;



let html="";



if(данные.signals.length===0){


html=`

<div class="card empty">

⏳ Сейчас сильных торговых сигналов нет

<br><br>

Сканер анализирует рынок...

</div>

`;



}



данные.signals.forEach((s,index)=>{



let направление =
s.direction=="LONG"
?
"🟢 ЛОНГ"
:
"🔴 ШОРТ";



let стиль =
s.direction=="LONG"
?
"long"
:
"short";



let цвет =
s.direction=="LONG"
?
"green"
:
"red";



html += `


<div class="card ${стиль}">


<h2>

#${index+1}

${s.symbol}


<span class="badge ${цвет}">

${направление}

</span>


</h2>



<div class="score">

Сила сигнала:
${s.score}/100

</div>



<div class="grid">


<div class="box">

💰 Цена

<br>

<b>${s.price}</b>

</div>



<div class="box">

📉 RSI

<br>

<b>${s.rsi}</b>

</div>



<div class="box">

🎯 Уверенность

<br>

<b>${s.confidence}%</b>

</div>



<div class="box">

🛑 Стоп

<br>

<b>${s.stop}</b>

</div>


</div>



<h3>

📌 Причины входа:

</h3>


<div class="reason">

${s.reasons.join("<br>")}

</div>



</div>


`;



});



document.getElementById("terminal").innerHTML=html;


}

catch(e){


document.getElementById("status").innerHTML=

"🔴 Ошибка подключения: "+e;


}



}



загрузить();


setInterval(

загрузить,

15000

);



</script>


</body>

</html>
